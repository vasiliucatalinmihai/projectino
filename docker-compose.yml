services:
  nginx:
    image: nginx:alpine
    container_name: productino-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/conf:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network
    restart: unless-stopped

  backend:
    build:
      context: ./code/productino-backend
      dockerfile: Dockerfile
      args:
        NODE_ENV: development
    container_name: productino-backend
    command: sh -c "yarn install && yarn prisma:generate && yarn prisma db push && yarn seed && yarn start:dev"
    ports:
      - "3001:8080"
      - "9230:9229"
    env_file:
      - ./code/productino-backend/.env
    environment:
      - NODE_ENV=development
      - PORT=8080
      - DATABASE_URL=postgresql://productino:secret@postgres:5432/productino
    volumes:
      - ./code/productino-backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      - postgres
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./code/productino-frontend
      dockerfile: Dockerfile
      args:
        NODE_ENV: development
    container_name: productino-frontend
    command: sh -c "yarn install && yarn dev"
    ports:
      - "3000:3000"
    env_file:
      - ./code/productino-frontend/.env
    environment:
      - NODE_ENV=development
      # Browser -> backend through the nginx proxy
      - NUXT_PUBLIC_API_BASE=http://dev-api.production.io
      # Server-side (SSR) -> backend over the docker network
      - NUXT_API_BASE_INTERNAL=http://backend:8080
    volumes:
      - ./code/productino-frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: productino-postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=productino
      - POSTGRES_PASSWORD=secret
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  backend_node_modules:
  frontend_node_modules:
